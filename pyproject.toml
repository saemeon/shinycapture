[tool.uv.workspace]
members = ["packages/*"]
exclude = ["packages/corpframe-gallery", "packages/mcd", "packages/corpplt", "packages/corporate-design-packager"]

[tool.uv.sources]
dash-fn-forms = { workspace = true }
dash-capture = { workspace = true }
mpl-brandpacker = { workspace = true }
corpframe = { workspace = true }
gallery-viewer = { workspace = true }

[dependency-groups]
test = ["pytest", "pytest-cov"]
doc = ["mkdocs", "mkdocs-material", "mkdocstrings[python]", "mike"]
dev = [
    "ruff",
    "prek",
    "ty",
    "numpy",
    "matplotlib",
    "pandas",
    "ipykernel>=7.2.0",
    "ipywidgets>=8.1.8",
    "pydantic>=2.12.5",
    "dash-mantine-components>=2.6.0",
    "dash-bootstrap-components>=2.0.4",
    "annotated-types>=0.7.0",
    "dash[testing]",
    "dash-ace>=0.2.1",
    { include-group = "test" },
    { include-group = "doc" },
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=packages --cov-report=term-missing"

[tool.ty.environment]
python = ".venv"

[tool.ty.src]
include = ["packages"]

[tool.mypy]
ignore_missing_imports = true

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM", "PERF"]
ignore = ["E203", "E501"]
