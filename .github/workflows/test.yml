name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: R ${{ matrix.r }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r: ["release", "devel"]

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, any::covr
          needs: check

      - name: Test
        run: |
          Rscript -e 'testthat::test_local()'

      - name: Coverage
        if: matrix.r == 'release'
        run: Rscript -e 'covr::codecov(quiet = FALSE)'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
