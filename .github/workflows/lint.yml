name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, any::spelling
          pak-version: devel

      - name: Spell check
        run: |
          Rscript -e '
            results <- spelling::spell_check_package()
            if (nrow(results) > 0) {
              print(results)
              stop("Spell check failed")
            }'

      - name: Lint
        run: Rscript -e 'lintr::lint_package()'
